services:
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
      - postgres
      - qdrant

  worker:
    build: .
    command: celery -A worker:celery_app worker --loglevel=info --concurrency=4
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
      - postgres
      - qdrant

  beat:
    build: .
    command: celery -A worker:celery_app beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  qdrant_data: